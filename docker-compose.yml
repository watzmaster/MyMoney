name: mymoney

services:
  mymoney-api:
    container_name: mymoney-api
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_SECRET: change-this-secret-before-production
      DB_HOST: mymoney-db
      DB_PORT: 3306
      DB_DATABASE: mymoney
      DB_USERNAME: mymoney_user
      DB_PASSWORD: mymoney_password
    depends_on:
      mymoney-db:
        condition: service_healthy
    volumes:
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public

  mymoney-db:
    container_name: mymoney-db
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mymoney
      MYSQL_USER: mymoney_user
      MYSQL_PASSWORD: mymoney_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mymoney_mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d

  mymoney-phpmyadmin:
    container_name: mymoney-phpmyadmin
    image: phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mymoney-db
      PMA_PORT: 3306
      PMA_USER: mymoney_user
      PMA_PASSWORD: mymoney_password
    depends_on:
      mymoney-db:
        condition: service_healthy

volumes:
  mymoney_mysql_data:
